name: Deploy Rerun Page

on:
  push:
    branches: [main]
    paths: ["docs/**"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: GitHub Token 주입
        env:
          RERUN_TOKEN: ${{ secrets.RERUN_GITHUB_TOKEN }}
        run: |
          if [ -z "$RERUN_TOKEN" ]; then
            echo "::error::RERUN_GITHUB_TOKEN Secret이 비어있습니다. GitHub Secrets를 확인하세요."
            exit 1
          fi
          sed -i "s|__RERUN_TOKEN__|${RERUN_TOKEN}|g" docs/index.html
          if grep -q "__RERUN_TOKEN__" docs/index.html; then
            echo "::error::토큰 치환 실패 - 플레이스홀더가 아직 남아있습니다."
            exit 1
          fi
          echo "토큰 주입 성공"

      - name: GitHub Pages 설정
        uses: actions/configure-pages@v5

      - name: 페이지 아티팩트 업로드
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      - name: 배포
        uses: actions/deploy-pages@v4
        id: deployment
