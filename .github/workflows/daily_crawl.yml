name: Daily Media Crawl

on:
  # 매일 오전 8시 KST (= 23:00 UTC 전날)
  schedule:
    - cron: "0 23 * * *"
  # Streamlit 앱 또는 GitHub UI에서 수동 실행 가능
  workflow_dispatch:
    inputs:
      target_date:
        description: "재처리 대상 날짜 (YYYY-MM-DD, 비우면 KST 기준 전일)"
        required: false
        default: ""
      allow_partial_upload:
        description: "일부 매체 실패 시에도 Sheets 업로드 진행 (1이면 허용)"
        required: false
        default: "0"

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      TZ: Asia/Seoul
      TARGET_DATE: ${{ github.event.inputs.target_date }}
      ALLOW_PARTIAL_UPLOAD: ${{ github.event.inputs.allow_partial_upload }}

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: 단위 테스트 실행
        run: python -m unittest discover -s tests

      - name: Firefox 설치
        uses: browser-actions/setup-firefox@v1

      - name: Firefox 버전 확인
        run: firefox --version

      - name: 크롤링 및 Sheets 업로드 실행
        env:
          RTBHOUSE_EMAIL:    ${{ secrets.RTBHOUSE_EMAIL }}
          RTBHOUSE_PASSWORD: ${{ secrets.RTBHOUSE_PASSWORD }}
          BUZZVIL_EMAIL:     ${{ secrets.BUZZVIL_EMAIL }}
          BUZZVIL_PASSWORD:  ${{ secrets.BUZZVIL_PASSWORD }}
          GOOGLE_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_SERVICE_ACCOUNT }}
        run: python main.py

      - name: 실행 결과 요약 출력
        if: always()
        run: echo "작업 완료"

      - name: 디버그 스크린샷 업로드
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: /tmp/*.png
          if-no-files-found: ignore
