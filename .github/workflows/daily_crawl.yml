name: Daily Media Crawl

on:
  # 매일 오전 8시 KST (= 23:00 UTC 전날)
  schedule:
    - cron: "0 23 * * *"
  # Streamlit 앱 또는 GitHub UI에서 수동 실행 가능
  workflow_dispatch:
    inputs:
      target_date:
        description: "단일 날짜 (YYYY-MM-DD) — date_from/date_to와 함께 쓰지 말것"
        required: false
        default: ""
      date_from:
        description: "기간 시작 날짜 (YYYY-MM-DD)"
        required: false
        default: ""
      date_to:
        description: "기간 종료 날짜 (YYYY-MM-DD)"
        required: false
        default: ""
      allow_partial_upload:
        description: "일부 매체 실패 시에도 Sheets 업로드 진행 (1이면 허용)"
        required: false
        default: "0"

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      TZ: Asia/Seoul

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: 단위 테스트 실행
        run: python -m unittest discover -s tests

      - name: Firefox 설치
        uses: browser-actions/setup-firefox@v1

      - name: Firefox 버전 확인
        run: firefox --version

      - name: 크롤링 및 Sheets 업로드 실행
        env:
          TARGET_DATE: ${{ github.event.inputs.target_date }}
          DATE_FROM: ${{ github.event.inputs.date_from }}
          DATE_TO: ${{ github.event.inputs.date_to }}
          ALLOW_PARTIAL_UPLOAD: ${{ github.event.inputs.allow_partial_upload || '0' }}
          RTBHOUSE_EMAIL:    ${{ secrets.RTBHOUSE_EMAIL }}
          RTBHOUSE_PASSWORD: ${{ secrets.RTBHOUSE_PASSWORD }}
          BUZZVIL_EMAIL:     ${{ secrets.BUZZVIL_EMAIL }}
          BUZZVIL_PASSWORD:  ${{ secrets.BUZZVIL_PASSWORD }}
          GOOGLE_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_SERVICE_ACCOUNT }}
        run: python main.py

      - name: 디버그 스크린샷 업로드
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: /tmp/*.png
          if-no-files-found: ignore

      - name: Slack 알림 전송
        if: always()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          GAS_RERUN_URL: ${{ vars.GAS_RERUN_URL }}
          JOB_STATUS: ${{ job.status }}
        run: |
          if [ "$JOB_STATUS" = "success" ]; then
            ICON=":white_check_mark:"
            STATUS_TEXT="업로드 성공"
          else
            ICON=":x:"
            STATUS_TEXT="업로드 실패"
          fi
          TARGET=$(TZ=Asia/Seoul date -d 'yesterday' '+%Y-%m-%d' 2>/dev/null || TZ=Asia/Seoul date -v-1d '+%Y-%m-%d')
          RERUN_PART=""
          if [ -n "$GAS_RERUN_URL" ]; then
            RERUN_PART="\n<${GAS_RERUN_URL}|재실행>"
          fi
          curl -s -X POST "$SLACK_WEBHOOK_URL" \
            -H 'Content-Type: application/json' \
            -d "{\"text\": \"${ICON} *[수기매체 자동화]* ${STATUS_TEXT}\n대상 날짜: \`${TARGET}\`${RERUN_PART}\"}"
