<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>수기매체 자동화 재실행</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f7;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      padding: 40px 36px;
      width: 100%;
      max-width: 440px;
    }

    .icon { font-size: 40px; margin-bottom: 12px; }

    h1 {
      font-size: 20px;
      font-weight: 700;
      color: #1a1a1a;
      margin-bottom: 6px;
    }

    .desc {
      font-size: 14px;
      color: #666;
      margin-bottom: 28px;
      line-height: 1.6;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #444;
      margin-bottom: 8px;
    }

    input[type="date"],
    input[type="password"] {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid #e0e0e0;
      border-radius: 10px;
      font-size: 15px;
      color: #1a1a1a;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 16px;
      background: #fff;
    }

    input:focus { border-color: #4f7cff; }

    .token-row {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    .token-row input { margin-bottom: 0; flex: 1; }

    .token-save-btn {
      padding: 12px 14px;
      background: #f0f0f0;
      border: 1.5px solid #e0e0e0;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      color: #444;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s;
    }

    .token-save-btn:hover { background: #e0e0e0; }

    .token-hint {
      font-size: 12px;
      color: #999;
      margin-top: -10px;
      margin-bottom: 20px;
    }

    .divider {
      border: none;
      border-top: 1px solid #f0f0f0;
      margin: 20px 0;
    }

    /* 모드 탭 */
    .mode-tabs {
      display: flex;
      background: #f5f5f7;
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 20px;
    }

    .mode-tab {
      flex: 1;
      padding: 9px;
      text-align: center;
      font-size: 13px;
      font-weight: 600;
      color: #888;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      border: none;
      background: transparent;
    }

    .mode-tab.active {
      background: #fff;
      color: #4f7cff;
      box-shadow: 0 1px 4px rgba(0,0,0,0.10);
    }

    /* 기간 선택 행 */
    .date-range-row {
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }

    .date-range-row .date-group {
      flex: 1;
    }

    .date-range-row label {
      font-size: 12px;
      color: #888;
      margin-bottom: 6px;
    }

    .date-range-row input { margin-bottom: 0; }

    .range-arrow {
      padding-top: 38px;
      color: #bbb;
      font-size: 18px;
    }

    button#run-btn {
      width: 100%;
      padding: 14px;
      background: #4f7cff;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, opacity 0.2s;
      margin-top: 4px;
    }

    button#run-btn:hover { background: #3a66e8; }
    button#run-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .result {
      margin-top: 20px;
      padding: 14px 16px;
      border-radius: 10px;
      font-size: 14px;
      line-height: 1.6;
      white-space: pre-line;
      display: none;
    }

    .result.success { background: #eaf4eb; color: #2d7a3a; }
    .result.error   { background: #fdecea; color: #b71c1c; }

    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📊</div>
    <h1>수기매체 자동화 재실행</h1>
    <p class="desc">재처리할 날짜를 선택하고 실행하면<br>해당 날짜 데이터를 다시 수집·업로드합니다.</p>

    <label>GitHub Token</label>
    <div class="token-row">
      <input type="password" id="token-input" placeholder="ghp_xxxx..." />
      <button class="token-save-btn" onclick="saveToken()">저장</button>
    </div>
    <p class="token-hint">* 이 기기에 저장됩니다. 다음 방문 시 자동 입력됩니다.</p>

    <hr class="divider" />

    <!-- 모드 탭 -->
    <div class="mode-tabs">
      <button class="mode-tab active" id="tab-single" onclick="setMode('single')">단일 날짜</button>
      <button class="mode-tab" id="tab-range" onclick="setMode('range')">기간 선택</button>
    </div>

    <!-- 단일 날짜 -->
    <div id="panel-single">
      <label for="date-single">날짜</label>
      <input type="date" id="date-single" />
    </div>

    <!-- 기간 선택 -->
    <div id="panel-range" style="display:none;">
      <div class="date-range-row">
        <div class="date-group">
          <label for="date-from">시작 날짜</label>
          <input type="date" id="date-from" />
        </div>
        <div class="range-arrow">→</div>
        <div class="date-group">
          <label for="date-to">종료 날짜</label>
          <input type="date" id="date-to" />
        </div>
      </div>
    </div>

    <button id="run-btn" onclick="run()">실행</button>

    <div class="result" id="result"></div>
  </div>

  <script>
    var REPO = "yjhwang-svg/nonauto-media";
    var WF   = "daily_crawl.yml";
    var mode = "single";

    (function init() {
      var saved = localStorage.getItem("gh_token");
      if (saved) document.getElementById("token-input").value = saved;

      var yesterday = getYesterday();
      document.getElementById("date-single").value = yesterday;
      document.getElementById("date-single").max   = yesterday;
      document.getElementById("date-from").max      = yesterday;
      document.getElementById("date-to").max        = yesterday;
      document.getElementById("date-from").value    = yesterday;
      document.getElementById("date-to").value      = yesterday;
    })();

    function getYesterday() {
      var d = new Date();
      d.setDate(d.getDate() - 1);
      return d.toISOString().slice(0, 10);
    }

    function setMode(m) {
      mode = m;
      document.getElementById("tab-single").className = "mode-tab" + (m === "single" ? " active" : "");
      document.getElementById("tab-range").className  = "mode-tab" + (m === "range"  ? " active" : "");
      document.getElementById("panel-single").style.display = m === "single" ? "" : "none";
      document.getElementById("panel-range").style.display  = m === "range"  ? "" : "none";
    }

    function saveToken() {
      var token = document.getElementById("token-input").value.trim();
      if (!token) { alert("토큰을 입력해주세요."); return; }
      localStorage.setItem("gh_token", token);
      alert("저장됐습니다.");
    }

    function run() {
      var token = document.getElementById("token-input").value.trim();
      if (!token) { alert("GitHub Token을 입력해주세요."); return; }

      var inputs = { allow_partial_upload: "1" };
      var label  = "";

      if (mode === "single") {
        var d = document.getElementById("date-single").value;
        if (!d) { alert("날짜를 선택해주세요."); return; }
        inputs.target_date = d;
        label = d;
      } else {
        var from = document.getElementById("date-from").value;
        var to   = document.getElementById("date-to").value;
        if (!from || !to) { alert("시작/종료 날짜를 모두 선택해주세요."); return; }
        if (from > to)    { alert("시작 날짜가 종료 날짜보다 늦습니다."); return; }
        inputs.date_from = from;
        inputs.date_to   = to;
        label = from === to ? from : from + " ~ " + to;
      }

      var btn    = document.getElementById("run-btn");
      var result = document.getElementById("result");
      btn.disabled  = true;
      btn.innerHTML = '<span class="spinner"></span>실행 중...';
      result.style.display = "none";

      fetch("https://api.github.com/repos/" + REPO + "/actions/workflows/" + WF + "/dispatches", {
        method: "POST",
        headers: {
          "Authorization": "Bearer " + token,
          "Accept": "application/vnd.github+json",
          "X-GitHub-Api-Version": "2022-11-28",
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ ref: "main", inputs: inputs })
      })
      .then(function(res) {
        btn.disabled  = false;
        btn.innerHTML = "실행";
        if (res.status === 204) {
          result.className   = "result success";
          result.textContent = "✅ " + label + " 재실행이 시작됐습니다.\n약 3~5분 후 완료됩니다.";
        } else {
          return res.text().then(function(text) {
            result.className   = "result error";
            result.textContent = "❌ 실행 실패 (HTTP " + res.status + ")\n" + text;
          });
        }
        result.style.display = "block";
      })
      .catch(function(err) {
        btn.disabled  = false;
        btn.innerHTML = "실행";
        result.className   = "result error";
        result.textContent = "❌ 오류: " + err.message;
        result.style.display = "block";
      });
    }
  </script>
</body>
</html>
